[pytest]
testpaths = tests
pythonpath = src tests
addopts = -ra --strict-markers --tb=short
markers =
    integration: tests that invoke ffmpeg end-to-end (slow)
    gpu: tests that require an NVENC-capable GPU
    gui: tests that require PySide6
    slow: long-running scale / stress tests (skipped with -m "not slow")
filterwarnings =
    ignore::DeprecationWarning
